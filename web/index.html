<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA meta -->
  <meta name="description" content="SongCatcher — Catch the song first! A multiplayer music guessing game.">
  <meta name="theme-color" content="#0f0f1a">

  <!-- Open Graph -->
  <meta property="og:title"       content="SongCatcher">
  <meta property="og:description" content="Catch the song first! Multiplayer music guessing game.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://songcatcher.io">
  <meta property="og:image"       content="https://songcatcher.io/icons/og-image.png">

  <!-- Twitter card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="SongCatcher 🎵">
  <meta name="twitter:description" content="Guess the song faster than your friends!">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon"      href="icons/Icon-192.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <title>SongCatcher</title>

  <style>
    /* Splash screen while Flutter loads */
    body {
      margin: 0;
      background-color: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    #loading .logo {
      font-size: 48px;
      animation: pulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.6; transform: scale(0.97); }
      to   { opacity: 1.0; transform: scale(1.03); }
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(180, 100, 255, 0.2);
      border-top-color: #b464ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
<div id="loading">
  <div class="logo">🎵</div>
  <div class="spinner"></div>
  <span>Loading SongCatcher…</span>
</div>

<!-- Flutter bootstrap -->
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
