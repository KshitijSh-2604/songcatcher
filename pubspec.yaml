name: songcatcher
description: "Guess the song before anyone else — songcatcher.io"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (v3/v5 — required for Flutter 3.24+ web support)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true